body:
  text: 禪門之法如經論所說乃有多義非直一名一名禪定門亦名制心門亦名照心門亦名覺心門亦名察心門亦名正心門亦名知心門亦名了心門亦名達心門亦名徵心門亦名息心門亦名定心門亦名悟心門亦名住心門亦名安心門何名安心門者由常看守心故熟看諸境種種相貌一切境界悉知不從外來迷是自心變作知境界唯是自心作此觀自然漸合唯識觀智唯識者遮詮為義遮卻雜染虛妄之法詮取真如佛性者不去不來不生不滅不取不捨不垢不淨無為無染無著自性清淨湛然常名為唯識觀智故言亦名安心門此出唯識論又言住心門者常看守心故心即不起無動故心即安住維摩經云心常安住無礙解脫故言住心門言悟心門者由久看心不起動即自心體即與道合心虛空寂無礙為道故言悟心門言定心門者由常看守心故於五欲境界不為亂惑由看心中不令亂故維摩經云念定總持故言定心門言息心門者由常看守心故息妄緣念歸真寂定故言息心門言徵心門者由常看守心故即見心心數法攀緣妄想卻徵緣心虛妄不可得故云徵心門言達心門者由常看守心故漸達自心本性清淨不為一切煩惱之垢之所染污猶如虛空故云達心門言了心門者由常看守心了自己心無障礙靈通迅速如體常住不動畢竟寂滅即涅槃相故云了心門言知心門者由常看守心故知去來知心生時知心滅時復常知過去心已滅不可得未來心未至不可得現在心無住不可得由常看守心故知心去來生滅悉常善故云知心門言正心門者由常看守心故不令妄念輒生正念不移故云正心門言察心門者由常看守心故察煩惱賊六根之中六個頭首大賊六賊者眼愛美色耳貪好聲鼻貪美香舌貪美味身貪滑觸意內貪塵弊聲香味觸也若貪著生愛即為所燒是故智者察六塵賊不令得入譬如關令守門端坐專察門中有人來去悉須察慮不得一人輒盜來去察心亦爾所言察者即是覺察之義覺察心口善惡等念悉無有偏若有善即隨生有滅有惡念總守覺察挫制斷除常自察慮身心過失故云察心門言覺心門者由常看守心故即覺自心體性真如無色無形非常非斷非內非外亦非中間離諸色相不出不沒不來不去不生不滅非垢非淨亦非方圓大小長短離有離無畢竟空寂此是自家真如本性清淨心不可得以言說分別顯示維摩經云如自觀身實相觀佛亦然心亦前際不來後際不去今則不住與佛同體與法相應自體無為即合僧義即是僧寶動成物執即為法義即是法寶常覺即為佛義即是佛寶覺照見心中三寶復覺道在身中若心內覺不久見佛若著相外求纍劫彌遠去道轉遙華嚴經云自歸依佛自歸依法僧此是心中一體三寶維摩經云若自觀者名為正觀若他觀者名為邪觀謂自觀身心得禪定解脫道故名正觀邪觀者謂身心之外別取境界惑見諸佛菩薩青黃赤白光明等事並是相心妄見與道違故名邪觀又言覺心者是覺悟之心覺悟自心即是真佛無量壽觀經云是心是佛念佛三昧經云念佛祇是念心求心祇是求佛所以者何心識無體相維摩經云煩惱即是菩提謂覺煩惱性空無有處所名為菩提故名覺心門言照心門者慧日明朗照自心室不以日月所照為明觀音經云慧日破諸暗故云照心門言制心門者心為身主成敗之事皆由自心造惡並是心作善即天堂所近惡即地獄所收不離生死大士發心善惡俱斷降伏自心入無生正觀遺教經云制心一處無事不辨故名制心門言禪定解脫心門者禪定能絶念定即無思心無思念體性明淨離諸結縛名為解脫法華經云禪定解脫等不可思議法故云禪定解脫心門録文完
