front:
  text: 天竺國菩提達摩禪師論整理者方廣錩題解天竺國菩提達摩禪師論又名達摩禪師論中國僧人假託禪宗初祖菩提達摩所撰典籍著者不詳一卷已知在敦煌遺書中存有兩號伯號首尾完整與北新號首殘尾全文字略有差異在藏外佛教文獻第一輯中已綜合兩號錄為全本考慮到古代佛典在傳抄中頗有增衍嬗變形成異本的情況在此將兩號分別錄文以供參考詳情請參見藏外佛教文獻第一輯天竺國菩提達摩禪師論題解錄文一以伯號為底本無校本個別地方據北新號校勘錄文二以北新號為底本無校本個別地方以伯號校勘錄文一
